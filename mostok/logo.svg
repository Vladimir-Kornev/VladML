<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- MOSTOK 慕东 — seal mark: bridge arch to the rising East -->
  <rect x="4" y="4" width="88" height="88" rx="14" fill="#C8381D"/>
  <!-- rising sun (the East) -->
  <circle cx="48" cy="34" r="9" fill="#F6F1E7"/>
  <!-- bridge arch doubling as the letter M -->
  <path d="M18 72 V52 C18 38 32 30 48 52 C64 30 78 38 78 52 V72"
        fill="none" stroke="#F6F1E7" stroke-width="7" stroke-linecap="round"/>
  <!-- water line -->
  <path d="M30 80 H66" stroke="#F6F1E7" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
</svg>
